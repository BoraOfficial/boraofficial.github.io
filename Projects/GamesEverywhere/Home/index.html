<script>

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function changetitle() {
	for (;;) {
		document.title = "G";
		await sleep(330);
		document.title = "Ga";
		await sleep(330);
		document.title = "Gam";
		await sleep(330);
		document.title = "Game";
		await sleep(330);
		document.title = "Games";
		await sleep(330);
		document.title = "Games E";
		await sleep(330);
		document.title = "Games Ev";
		await sleep(330);
		document.title = "Games Eve";
		await sleep(330);
		document.title = "Games Ever";
		await sleep(330);
		document.title = "Games Every";
		await sleep(330);
		document.title = "Games Everyw";
		await sleep(330);
		document.title = "Games Everywh";
		await sleep(330);
		document.title = "Games Everywher";
		await sleep(330);
		document.title = "Games Everywhere!";
		await sleep(330);
		document.title = "Games Everywhere!!";
		await sleep(200);
		document.title = "Gam";
		await sleep(330);
		document.title = "Game";
		await sleep(330);
		document.title = "Games";
		await sleep(330);
		document.title = "Games On";
		await sleep(330);
		document.title = "Games On B";
		await sleep(330);
		document.title = "Games On Br";
		await sleep(330);
		document.title = "Games On Bro";
		await sleep(330);
		document.title = "Games On Brow";
		await sleep(330);
		document.title = "Games On Brows";
		await sleep(330);
		document.title = "Games On Browse";
		await sleep(330);
		document.title = "Games On Browser";
		await sleep(330);
		document.title = "Games On Browser!";
		await sleep(200);
		document.title = "Games On Browser!!";
	}
}

changetitle();
</script>

<style>
.round {
  position: relative;
  border-radius: 25px;
  padding: 20px; 
  opacity: 1;
  display: block;
  width: 80%;
  height: auto;
  transition: .5s ease;
  backface-visibility: hidden;
}
.container {
  position: relative;
  width: 50%;
  float: left;
}

.rightcontainer {
  position: relative;
  float: right;
  width: 50%;
}

.rightcontainer:hover .round {
  opacity: 0.9;
}

.rightcontainer:hover .middle {
  opacity: 1;
}

.image {
  opacity: 1;
  display: block;
  width: 100%;
  height: auto;
  transition: .5s ease;
  backface-visibility: hidden;
}
.middle {
  font-size: 16px;
  padding: 16px 32px;
  transition: .5s ease;
  opacity: 0;
  position: absolute;
  top: 50%;
  left: 42%;
  transform: translate(-50%, -50%);
  -ms-transform: translate(-50%, -50%);
  text-align: center;
}

.container:hover .round {
  opacity: 0.9;
}

.container:hover .middle {
  opacity: 1;
}

.play {
  background-color: #04AA6D;
  color: white;
  font-size: 16px;
  padding: 16px 32px;
}

.style {
  background-color: #4CAF50; /* Color you desire */
  border: none;
  color: white;
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
  background-color: #04AA6D;
  color: white;

}
.input {
  position: relative;
  background-color: #04AA6D;
  border: none;
  font-size: 28px;
  color: #FFFFFF;
  text-align: center;
  -webkit-transition-duration: 0.4s; /* Safari */
  transition-duration: 0.4s;
  text-decoration: none;
  overflow: hidden;
  cursor: pointer;
  border: none;
  color: white;
  padding: 20px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
  width: 80px;
  height: 60px;
}
.input:after {
  content: "";
  display: block;
  position: absolute;
  padding-top: 300%;
  padding-left: 350%;
  margin-left: -20px!important;
  margin-top: -120%;
  opacity: 0;
  transition: all 0.8s
}

.input:active:after {
  padding: 0;
  margin: 0;
  opacity: 1;
  transition: 0s
}

.input {border-radius: 12px;}
</style>
