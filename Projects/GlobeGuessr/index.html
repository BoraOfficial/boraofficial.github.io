<!DOCTYPE HTML>
<title>Globe Guessr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fasthand&family=Ubuntu&display=swap" rel="stylesheet"> 
<script src="./aframe.min.js"></script>
<script src="./charts.js"></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
<script type="text/javascript" src="./jquery.cookie.min.js"></script>
<link rel="stylesheet" type="text/css" href="./style.css">
<link rel="icon" type="image/x-icon" href="./static/favicon.ico">
<body>
    <a-scene>
        <a-sky></a-sky>
    </a-scene> 
</body>

<img onclick="showMap(true)" src="./static/globe.png" style="z-index: 9999;position: absolute;width: 7rem;right: 5px;bottom: 0;cursor: pointer;">

<img src="./static/reload.png" onclick="location.reload()" style="z-index: 9999;position: absolute; top: 0;width: 3.5rem;cursor: pointer;filter: drop-shadow(5px 5px 6px #622e00);">

<img id="close" src="./static/close.png" onclick="showMap(false)" style="cursor: pointer;z-index: 9999;position: absolute;top: 5px;width: 2.5rem;visibility: hidden;filter: drop-shadow(5px 5px 6px #730000e8);left: 5px;">

<div class="map-container" style="width: 600px;top: 0;position: absolute;right: 33%; z-index: 9999; visibility: hidden;">
  <div id="chart"></div>
</div>

<div id="finish" style="visibility: hidden;z-index: 999999;position: absolute;top: 0;right: 35%;font-size: 24px;">
    <center>
        <h1 style="font-family: 'Ubuntu', sans-serif;">Streak Broken!</h1>
        <p id="streak" style="font-family: 'Ubuntu', sans-serif;">Your undefined in a row streak was broken!</p>
        <p id="correct-answer" style="font-family: 'Ubuntu', sans-serif; font-size: 16px;">The correct answer was</p>
        <button class="btn-pill" onclick="location.reload()">Play again</button>
    </center>
</div>

<div id="correct" style="visibility: hidden;z-index: 999999;position: absolute;top: 0;right: 40%;font-size: 24px;">
    <center>
        <h1 id="row" style="font-family: 'Ubuntu', sans-serif;">undefined in a row!</h1>
        <p id="streak-count" style="font-family: 'Ubuntu', sans-serif;">Loading...</p>
        <button class="btn-pill" onclick="location.reload()">Next</button>
    </center>
</div>


<div id="info" style="visibility: hidden"></div>


<script src="./script.js"></script>
